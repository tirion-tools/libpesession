# Lint on push to main and PRs. Findings show up as GitHub workflow
# annotations on the PR Files tab.

name: clang-tidy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - '.clang-tidy'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - '.clang-tidy'
      - 'CMakeLists.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-tidy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: libpesession
    steps:
      - name: Checkout libpesession
        uses: actions/checkout@v4
        with:
          path: libpesession
          fetch-depth: 0

      # Sibling libs cloned under the workflow root so `../<lib>` in
      # CMakeLists resolves.
      - name: Checkout libshowplan
        uses: actions/checkout@v4
        with: { repository: tirion-tools/libshowplan, path: libshowplan }
      - name: Checkout libnrbf
        uses: actions/checkout@v4
        with: { repository: tirion-tools/libnrbf,     path: libnrbf }
      - name: Checkout libosession
        uses: actions/checkout@v4
        with: { repository: tirion-tools/libosession, path: libosession }

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang-tidy \
            libsqlite3-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          mapfile -t files < <(
            find src include -type f \
              \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
              2>/dev/null
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no source files to lint"
            exit 0
          fi
          echo "::group::clang-tidy: linting ${#files[@]} files"
          clang-tidy -p build -quiet "${files[@]}" 2>&1 | tee tidy.log
          echo "::endgroup::"

          awk -F: '
            /: (warning|error): / {
              file = $1; line = $2; col = $3;
              severity = ($4 ~ /error/) ? "error" : "warning";
              msg = $0;
              sub(/^[^:]+:[^:]+:[^:]+:[[:space:]]*(warning|error):[[:space:]]*/, "", msg);
              printf "::%s file=%s,line=%s,col=%s::%s\n",
                     severity, file, line, col, msg;
            }
          ' tidy.log

          if [ "${{ github.event_name }}" = "push" ]; then
            if grep -qE ': (warning|error): ' tidy.log; then
              echo "::error::clang-tidy reported findings on push-to-main"
              exit 1
            fi
          fi

      - name: Upload tidy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-log
          path: libpesession/tidy.log
          retention-days: 14
